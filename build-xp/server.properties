# MinecraftPE Dedicated Server configuration
# Lines starting with '#' or ';' are comments.
# Command-line flags override anything set here.

# UDP port the server listens on. Clients connect using this.
port=19132

# 'survival' or 'creative'.
gamemode=survival

# Display name shown to clients (and used as level dir if leveldir not set).
levelname=Test Server

# On-disk directory name for the level (relative to externalpath).
leveldir=world

# Base directory for level storage.
externalpath=.

# Temp file path.
cachepath=.
